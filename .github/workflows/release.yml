name: release

# Manual-only. The release flow needs the EdDSA private key that
# signs update zips for Sparkle, and that key lives in the
# maintainer's macOS Keychain — there's no way to feed it to a
# fresh `macos-14` runner without either committing the secret
# to a CI vault (security trade-off the maintainer hasn't made
# yet) or skipping signing (which leaves auto-update broken).
# So the canonical release flow is `./make-release.sh --publish
# --tag vX.Y.Z` run locally; the tag-push trigger used to fire
# this workflow and exit non-zero at the sign step on every
# release. `workflow_dispatch` keeps the workflow available for
# the "I deliberately want to test a CI build" case without
# spamming Actions with red ✗ entries.
on:
  workflow_dispatch:

# `gh release create` needs `contents: write`. Everything else
# stays at the read-only default.
permissions:
  contents: write

jobs:
  release:
    name: build + publish release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build + publish release
        # `make-release.sh --publish` reads $GITHUB_REF_NAME for the
        # tag, zips app/ApfsFastindex.app with `ditto` (preserves the
        # ad-hoc codesignature), and uploads it via `gh`. The
        # GITHUB_TOKEN below is what authorizes that upload.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./make-release.sh --publish
