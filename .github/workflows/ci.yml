name: ci

on:
  push:
    branches: [main]
  pull_request:

# Minimal default token scope. Individual jobs can opt back in
# if they need write access (none do today).
permissions:
  contents: read

# The whole build is macOS-bound (apfs-fastindex links against
# libSystem for getattrlistbulk and SwiftUI for the app target).
# Linux runners would only confuse the matrix and Apple-Silicon
# perf data, so we just don't run there.
jobs:
  rust-test:
    name: cargo test + clippy
    runs-on: macos-14
    steps:
      # Actions pinned to their commit SHA per OpenSSF supply-
      # chain guidance — a compromised `actions/checkout@v4`
      # floating tag could otherwise run arbitrary code in CI.
      # The trailing comment is the friendly version label.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache cargo
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: cargo clippy
        # Audit's CI gap callout — clippy lints catch real bugs
        # (panic-on-unwrap, unsound transmutes, lifetime
        # mistakes) that `cargo build` misses. Deny warnings so
        # lint regressions break the build.
        #
        # Three pre-existing lints are allowed for now to avoid
        # bundling a 38-call-site cleanup with the audit
        # follow-ups:
        #   - `doc_lazy_continuation`: doc-comment indentation
        #     style on multi-line bullets; cosmetic.
        #   - `explicit_auto_deref`: `&*box_str` patterns where
        #     auto-deref would suffice; stylistic.
        #   - `not_unsafe_ptr_arg_deref`: every `#[no_mangle]
        #     extern "C" fn` in `ffi.rs` dereferences a
        #     caller-supplied pointer. Marking them `unsafe fn`
        #     would be pedantically correct but changes the
        #     cbindgen header in ways the Swift importer doesn't
        #     care about. Tracked as a follow-up cleanup.
        run: |
          cargo clippy --all-targets --release -- \
            -D warnings \
            -A clippy::doc_lazy_continuation \
            -A clippy::explicit_auto_deref \
            -A clippy::not_unsafe_ptr_arg_deref \
            -A clippy::too_many_arguments \
            -A clippy::manual_is_multiple_of
      - name: cargo test
        run: cargo test -p apfs-fastindex --release

  cargo-audit:
    name: cargo audit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run audit
        run: cargo audit

  swift-ffi-tests:
    name: swift FFI tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache cargo
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build Rust crate + stage native bridge
        # `make-release.sh --no-bundle` runs cargo build, copies
        # libapfs_fastindex.a + apfs_fastindex.h into the SwiftPM
        # shim, and runs `swift build`. We skip the .app bundle
        # step because the FFI tests run against the built
        # library, not the bundle.
        run: ./make-release.sh --no-bundle
      - name: Run Swift FFI tests
        run: swift run --package-path app apfs-ffi-tests

  cbindgen-drift:
    name: cbindgen header drift
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache cargo
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build the crate so cbindgen runs
        # `build.rs` regenerates the header into
        # `target/<profile>/include/apfs_fastindex.h`. A
        # cbindgen failure panics the build script (commit
        # 35a5df6), so a successful build here is a precondition
        # for the diff below.
        run: cargo build --release -p apfs-fastindex
      - name: Diff against the committed header
        # Round-2 audit #N7: the previous symbol-grep let
        # signature / struct-layout drift through. A real
        # `git diff --exit-code` against the snapshot at
        # `crates/apfs-fastindex/include/apfs_fastindex.h`
        # catches *any* change to the FFI ABI, not just the
        # subset we remembered to grep for. To accept a
        # legitimate FFI change, run `cargo build` locally
        # and commit the regenerated header alongside the
        # Rust changes.
        run: |
          set -e
          COMMITTED=crates/apfs-fastindex/include/apfs_fastindex.h
          GENERATED=target/release/include/apfs_fastindex.h
          if ! diff -u "$COMMITTED" "$GENERATED"; then
            echo
            echo "ERROR: committed header is stale."
            echo "Run a release build locally and commit the"
            echo "regenerated $COMMITTED."
            exit 1
          fi
          echo "header drift check OK — committed and generated match"
