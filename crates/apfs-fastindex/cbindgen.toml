# cbindgen config for the `apfs-fastindex` crate's C ABI. Output
# is consumed by the SwiftPM `ApfsFastindex` target via a
# bridging header — every Swift call into Rust crosses this
# surface.
#
# `include_guard` + `language = "C"` keeps Xcode + the Swift
# importer happy; `cpp_compat = true` is on so the same header
# works in any Objective-C++ context that might pick it up.
language = "C"
header = "/* apfs-fastindex: generated by cbindgen — do not edit by hand. */"
include_guard = "APFS_FASTINDEX_H"
cpp_compat = true
documentation_style = "doxy"
no_includes = false
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]

[parse]
# Only walk what `#[no_mangle] extern "C"` directly exposes in
# `src/ffi.rs`. Deeper paths (internal modules, helpers) stay
# Rust-internal; cbindgen would otherwise try to emit C bindings
# for unrelated types.
parse_deps = false

[parse.expand]
crates = []

[fn]
# Every FFI function name we expose is already explicitly
# prefixed `apfs_…`, so no further rename rule is needed; the
# default `Both` rename pass converts Rust `snake_case` to itself.
rename_args = "None"

[enum]
# Repr-style C enums; the FFI surface stays C99-compatible.
prefix_with_name = false
rename_variants = "None"
